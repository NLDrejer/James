services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
      POSTGRES_DB: survey
    ports:
      - "5432:5432"
    volumes:
      - survey-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d survey"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  survey-db-data:
