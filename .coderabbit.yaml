# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  review_status: true
  auto_review:
    enabled: true
    auto_incremental_review: true
  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/*.lock"
  path_instructions:
    - path: "property-search-app/**/*.{ts,tsx,js,jsx}"
      instructions: "Focus on code quality, type safety, performance, and best practices for Next.js and React."
    - path: "property-search-app/*.config.{ts,js}"
      instructions: "Verify configuration is correct and follows best practices."
    - path: ".github/workflows/*.yml"
      instructions: "Verify workflow configuration is correct and follows best practices."
    - path: "property-search-app/src/db/**"
      instructions: "Check for SQL injection risks, schema compatibility, and migration safety."
